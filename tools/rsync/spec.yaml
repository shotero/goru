  option_groups:
  - name: Transfer selection
    summary: Choose what files are copied and how source lists are read.
    flags:
    - -a
    - -d
    - -r
    - --files-from
    - --include
    - --include-from
    - --exclude
    - --exclude-from
    - --filter
  - name: Metadata preservation
    summary: Preserve links, owners, groups, permissions, timestamps, devices, and
      extended metadata.
    flags:
    - -E
    - -g
    - -H
    - -K
    - -L
    - -l
    - -O
    - -o
    - -p
    - -t
    - --extended-attributes
    - --executability
  - name: Comparison and deletion
    summary: Control file comparison, deletion, updates, and destination handling.
    flags:
    - -c
    - -I
    - -u
    - --append
    - --checksum-seed
    - --compare-dest
    - --copy-dest
    - --del
    - --delete-after
    - --delete-before
    - --delete-delay
    - --delete-during
    - --delete-excluded
    - --existing
    - --ignore-existing
    - --ignore-non-existing
  - name: Transport
    summary: Configure compression, remote shell, ports, network timeouts, and bandwidth.
    flags:
    - '-4'
    - '-6'
    - -e
    - -z
    - --8-bit-output
    - --address
    - --bwlimit
    - --compress
    - --compress-level
    - --contimeout
    - --port
    - --protocol
    - --rsync-path
    - --sockopts
    - --timeout
  - name: Output and safety
    summary: Preview, inspect, and control output without changing transfer semantics.
    flags:
    - -h
    - -i
    - -n
    - -P
    - -q
    - -v
    - --itemize-changes
    - --list-only
    - --no-motd
    - --out-format
    - --progress
    - --stats
  - name: Batch and backup
    summary: Handle backups, partial files, delayed updates, and batch files.
    flags:
    - -b
    - -B
    - --backup-dir
    - --delay-updates
    - --partial
    - --partial-dir
    - --read-batch
    - --suffix
    - --only-write-batch
    - --write-batch
wrapper:
  usage:
  - goru run rsync copy <source...> <destination> [options] [-- native-rsync-options...]
  - goru run rsync mirror <source...> <destination> [options] [-- native-rsync-options...]
  - goru run rsync preview <source...> <destination> [options] [-- native-rsync-options...]
  - goru run rsync list <source> [options] [-- native-rsync-options...]
  - goru run rsync raw <native-args...>
  option_groups:
  - name: Endpoints
    options:
    - flag: --source
      key: sources
      argument: path
      repeatable: true
      native: positional
      description: Source path. May be repeated.
    - flag: --destination
      key: destination
      argument: path
      native: positional
      description: Destination path for copy, mirror, and preview.
  - name: Transfer
    options:
    - flag: --archive
      key: archive
      argument: false
      native: -a
      description: Preserve common metadata. Enabled automatically by mirror.
    - flag: --recursive
      key: recursive
      argument: false
      native: -r
      description: Copy directories recursively without full archive behavior.
    - flag: --compress
      key: compress
      argument: false
      native: -z
      description: Compress file data during transfer.
    - flag: --checksum
      key: checksum
      argument: false
      native: -c
      description: Compare by checksum instead of size and timestamp.
    - flag: --bwlimit
      key: bwlimit
      argument: limit
      native: --bwlimit
      description: Limit transfer bandwidth.
  - name: Metadata
    options:
    - flag: --links
      key: links
      argument: false
      native: -l
      description: Preserve symbolic links.
    - flag: --preserve-times
      key: preserve_times
      argument: false
      native: -t
      description: Preserve modification times.
    - flag: --preserve-owner
      key: preserve_owner
      argument: false
      native: -o
      description: Preserve owner.
    - flag: --preserve-group
      key: preserve_group
      argument: false
      native: -g
      description: Preserve group.
    - flag: --preserve-permissions
      key: preserve_permissions
      argument: false
      native: -p
      description: Preserve permissions.
  - name: Safety
    options:
    - flag: --dry-run
      key: dry_run
      argument: false
      native: -n
      description: Show what would happen without copying.
    - flag: --delete
      key: delete
      argument: false
      native: --del
      description: Delete destination files not present in source. Enabled automatically
        by mirror.
    - flag: --ignore-existing
      key: ignore_existing
      argument: false
      native: --ignore-existing
      description: Skip files that already exist on the destination.
  - name: Filters
    options:
    - flag: --exclude
      key: exclude
      argument: pattern
      repeatable: true
      native: --exclude
      description: Exclude files matching pattern. May be repeated.
    - flag: --include
      key: include
      argument: pattern
      repeatable: true
      native: --include
      description: Include files matching pattern. May be repeated.
    - flag: --filter
      key: filter
      argument: rule
      repeatable: true
      native: -f
      description: Add an rsync filter rule. May be repeated.
    - flag: --files-from
      key: files_from
      argument: file
      native: --files-from
      description: Read source file list from file.
    - flag: --max-size
      key: max_size
      argument: size
      native: --max-size
      description: Skip files larger than size.
    - flag: --min-size
      key: min_size
      argument: size
      native: --min-size
      description: Skip files smaller than size.
  - name: Output
    options:
    - flag: --verbose
      key: verbose
      argument: false
      native: -v
      description: Increase rsync verbosity.
    - flag: --quiet
      key: quiet
      argument: false
      native: -q
      description: Reduce rsync output.
    - flag: --progress
      key: progress
      argument: false
      native: --progress
      description: Show transfer progress.
    - flag: --stats
      key: stats
      argument: false
      native: --stats
      description: Show transfer statistics.
  subcommands:
  - name: copy
    usage: copy <source...> <destination>
    description: Copy files without deleting destination extras.
    maps_to: rsync [options] source... destination
    positional: sources_destination
  - name: mirror
    usage: mirror <source...> <destination>
    description: Synchronize destination and delete extras.
    maps_to: rsync -a --del [options] source... destination
    positional: sources_destination
    set:
      archive: true
      delete: true
  - name: preview
    usage: preview <source...> <destination>
    description: Show planned changes without copying.
    maps_to: rsync -n --itemize-changes [options] source... destination
    positional: sources_destination
    set:
      dry_run: true
    native_args:
    - --itemize-changes
  - name: list
    usage: list <source>
    description: List source contents without copying.
    maps_to: rsync --list-only [options] source
    positional: single_source
    native_args:
    - --list-only
  - name: raw
    usage: raw <native-args...>
    description: Run rsync directly with native arguments and no wrapper remapping.
    maps_to: rsync native-args...
    positional: raw
