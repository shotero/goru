$schema: ../../spec.schema.json
schema_version: 1
tool:
  name: rsync
  binary: rsync
  summary: Standardized rsync wrapper for copy, mirror, preview, and list workflows.
  raw_help_command:
  - --help
native:
  usage:
  - rsync [-0468BCDEFHIKLOPRSTWVabcdghiklnopqrtuvxyz] [-e program] [-f filter] [--8-bit-output]
    [--address=sourceaddr] [--append] [--backup-dir=dir] [--bwlimit=limit] [--cache
    | --no-cache] [--checksum-seed=NUM] [--chmod=mode] [--compare-dest=dir] [--compress]
    [--compress-level=NUM] [--contimeout] [--copy-dest=dir] [--copy-unsafe-links]
    [--del] [--delete-after | --delete-before | --delete-delay | --delete-during]
    [--delete-excluded] [--delay-updates] [--dirs] [--no-dirs] [--existing] [--exclude=pattern]
    [--exclude-from=file] [--executability] [--extended-attributes] [--existing] [--files-from=filespec]
    [--force] [--ignore-errors] [--ignore-existing] [--ignore-non-existing] [--include=pattern]
    [--include-from=file] [--inplace] [--itemize-changes] [--keep-dirlinks] [--link-dest=dir]
    [--list-only] [--max-delete=NUM] [--max-size=SIZE] [--min-size=SIZE] [--modify-window=sec]
    [--no-implied-dirs] [--no-motd] [--numeric-ids] [--out-format=FMT] [--partial]
    [--partial-dir] [--password-file=pwfile] [--port=portnumber] [--progress] [--protocol=NUM]
    [--prune-empty-dirs] [--read-batch=file] [--remove-source-files] [--rsync-path=program]
    [--safe-links] [--size-only] [--sockopts=sockopts] [--specials] [--stats] [--suffix]
    [--super] [--timeout=seconds] [--only-write-batch=file | --write-batch=file] source
    ... directory
